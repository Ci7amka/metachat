// Messaging service API definition (reference only — MVP uses HTTP/JSON)
syntax = "proto3";

package messaging;

option go_package = "github.com/Ci7amka/metachat/pkg/proto/messaging";

service MessagingService {
  rpc CreateConversation(CreateConversationRequest) returns (Conversation);
  rpc GetConversations(GetConversationsRequest) returns (ConversationList);
  rpc GetMessages(GetMessagesRequest) returns (MessageList);
  rpc SendMessage(SendMessageRequest) returns (Message);
  rpc MarkRead(MarkReadRequest) returns (Empty);
}

message CreateConversationRequest {
  repeated string participant_ids = 1;
}

message GetConversationsRequest {
  string user_id = 1;
}

message GetMessagesRequest {
  string conversation_id = 1;
  int32 limit = 2;
  string before = 3;
}

message SendMessageRequest {
  string conversation_id = 1;
  string sender_id = 2;
  string content = 3;
  string content_type = 4;
}

message MarkReadRequest {
  string message_id = 1;
  string conversation_id = 2;
  string user_id = 3;
}

message Conversation {
  string id = 1;
  repeated string participants = 2;
  Message last_message = 3;
  string created_at = 4;
  string updated_at = 5;
}

message ConversationList {
  repeated Conversation conversations = 1;
}

message Message {
  string id = 1;
  string conversation_id = 2;
  string sender_id = 3;
  string content = 4;
  string content_type = 5;
  string read_at = 6;
  string created_at = 7;
}

message MessageList {
  repeated Message messages = 1;
}

message Empty {}
