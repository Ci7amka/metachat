// Auth service API definition (reference only — MVP uses HTTP/JSON)
syntax = "proto3";

package auth;

option go_package = "github.com/Ci7amka/metachat/pkg/proto/auth";

service AuthService {
  rpc Register(RegisterRequest) returns (AuthResponse);
  rpc Login(LoginRequest) returns (AuthResponse);
  rpc RefreshToken(RefreshRequest) returns (AuthResponse);
  rpc Logout(LogoutRequest) returns (Empty);
  rpc GetProfile(GetProfileRequest) returns (UserProfile);
  rpc UpdateProfile(UpdateProfileRequest) returns (UserProfile);
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
}

message RegisterRequest {
  string email = 1;
  string password = 2;
  string name = 3;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message AuthResponse {
  string access_token = 1;
  string refresh_token = 2;
  UserProfile user = 3;
}

message RefreshRequest {
  string refresh_token = 1;
}

message LogoutRequest {
  string refresh_token = 1;
}

message GetProfileRequest {
  string user_id = 1;
}

message UpdateProfileRequest {
  string user_id = 1;
  string name = 2;
  string bio = 3;
  int32 age = 4;
  repeated string interests = 5;
  string avatar_url = 6;
}

message UserProfile {
  string id = 1;
  string email = 2;
  string name = 3;
  string bio = 4;
  int32 age = 5;
  repeated string interests = 6;
  string avatar_url = 7;
  string created_at = 8;
  string updated_at = 9;
}

message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenResponse {
  bool valid = 1;
  string user_id = 2;
}

message Empty {}
